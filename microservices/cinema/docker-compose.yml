version: "3.9"
services:
  catalog-db:
    image: postgres:16
    environment:
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
      POSTGRES_DB: catalog
    ports: ["5435:5432"]

  redis:
    image: redis:7
    ports: ["6380:6379"]

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  catalog-service:
    build:
      context: ../../
      dockerfile: microservices/cinema/catalog_service/Dockerfile
    environment:
      CATALOG_DATABASE_URL: postgresql+psycopg2://cinema:cinema@catalog-db:5432/catalog
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8002
    depends_on: [catalog-db, subscription-service]
    ports: ["8001:8001"]

  subscription-service:
    build:
      context: ../../
      dockerfile: microservices/cinema/subscription_service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/1
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on: [redis, rabbitmq]
    ports: ["8002:8002"]
