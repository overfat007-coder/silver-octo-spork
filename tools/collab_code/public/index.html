<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CRDT Code Editor</title>
    <style>
      body { font-family: sans-serif; margin: 20px; }
      textarea { width: 100%; height: 320px; font-family: monospace; }
      #cursors { margin-top: 8px; color: #333; }
      .pill { display:inline-block; background:#eef; border:1px solid #99c; padding:2px 8px; margin:2px; border-radius:12px; }
    </style>
  </head>
  <body>
    <h2>Realtime CRDT code editor</h2>
    <label>Your name: <input id="name" value="anon" /></label>
    <textarea id="editor"></textarea>
    <div id="cursors"></div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
