apiVersion: apps/v1
kind: Deployment
metadata: { name: smartflow-beat }
spec:
  replicas: 1
  selector: { matchLabels: { app: smartflow-beat } }
  template:
    metadata: { labels: { app: smartflow-beat } }
    spec:
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "-l", "info"]
          envFrom: [{ secretRef: { name: smartflow-secrets } }]
