apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres-shard0 }
spec:
  serviceName: postgres-shard0
  replicas: 1
  selector: { matchLabels: { app: postgres-shard0 } }
  template:
    metadata: { labels: { app: postgres-shard0 } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB, value: smartflow }
            - { name: POSTGRES_USER, value: smartflow }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: smartflow-secrets, key: POSTGRES_PASSWORD } } }
---
