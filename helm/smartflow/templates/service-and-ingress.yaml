apiVersion: v1
kind: Service
metadata: { name: smartflow-api }
spec:
  selector: { app: smartflow-api }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartflow-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: smartflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: smartflow-api, port: { number: 80 } }
